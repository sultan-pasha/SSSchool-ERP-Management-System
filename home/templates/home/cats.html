{% extends 'index.html' %}
{% load static %}
{% block spstyle %}
  <link rel="stylesheet" href="{% static './deb/plugins/styles/flipster.min.css' %}">
  <link rel="stylesheet" href="{% static './decore/tracks.css' %}">
  <link rel="stylesheet" href="{% static './decore/lect.css' %}">
{% endblock spstyle %}
    {% block title %}
      منصة ساكاد | المسارات
    {% endblock title %}
    {% block main %}
      {% include "catsmain.html" %}
    {% endblock main %}
    {% block spscript %}
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="{% static './js/index.js' %}"> </script>
    <script src="{% static './deb/plugins/scripts/flipster.min.js' %}"> </script>
    <script>
      var mainitem = document.querySelectorAll(".nav-item")[1]
      mainitem.classList.add("nav-active")

      {% for cats in cats %}
      var watchedlescat = 0
      var lescat = 0
      {% for wated in cuser.watchedlecs.all %}
        {% if wated.catname == cats %}
          watchedlescat++
        {% endif %}
      {% endfor %}
      {% for les in all %}
        {% if les.catname == cats %}
          lescat++
        {% endif %}
      {% endfor %}
      var percentage = (watchedlescat / lescat) * 100
      var ratepart = document.querySelectorAll(".rate{{ cats.id }}")
      var rate = percentage/100 * 5
      if (isNaN(rate)) {
        rate = 0
      }
      if (isNaN(percentage)) {
        percentage = 0
      }
      var prog = document.getElementsByClassName("sas-progress{{ cats.id }}");
      ratepart[0].innerHTML = percentage + "%";
      for (let i = 0; i < rate.toFixed(0); i++) {
        prog[0].innerHTML += "<div class='progress progress-active'></div>"
      }

      for (let i = 0; i < 5-rate.toFixed(0); i++) {
        prog[0].innerHTML += "<div class='progress'></div>"
      }
      
    {% endfor %}
    </script>
    {% endblock spscript %}
